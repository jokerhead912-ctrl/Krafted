name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.js'
      - 'build.sh'
      - 'package.json'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: node build.js

      - name: Commit & push built output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/kraftpub.html
          if git diff --staged --quiet; then
            echo "No changes to kraftpub.html"
          else
            git commit -m "🤖 Auto-build: ${{ github.event.head_commit.message }}"
            git push
          fi
